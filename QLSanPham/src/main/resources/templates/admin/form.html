<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header py-3" th:classappend="${sp.id == null ? 'bg-success' : 'bg-warning'}">
                        <h4 class="mb-0 text-white text-center" th:text="${title}"></h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/products/save}" th:object="${sp}" method="post">
                            
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên sản phẩm</label>
                                <input type="text" th:field="*{ten}" class="form-control" placeholder="VD: SamSung Galaxy A12" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                                <input type="number" th:field="*{gia}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Thể loại</label>
                                <select th:field="*{theLoai}" class="form-select" required>
                                    <option value="">-- Chọn loại --</option>
                                    <option th:each="loai : ${listLoai}" 
                                            th:value="${loai.id}" 
                                            th:text="${loai.ten}"></option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Mô tả chi tiết</label>
                                <textarea th:field="*{mota}" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn w-100 fw-bold" 
                                        th:classappend="${sp.id == null ? 'btn-success' : 'btn-warning'}"
                                        th:text="${sp.id == null ? 'Lưu sản phẩm mới?' : 'Xác nhận sửa'}">
                                </button>
                                <a href="/admin/products" class="btn btn-light border w-100">Hủy bỏ</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
