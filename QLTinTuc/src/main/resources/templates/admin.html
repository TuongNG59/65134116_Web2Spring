<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý tin tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Danh sách tin tức</h2>
    <a th:href="@{/admin/tin-tuc/them}" class="btn btn-primary mb-3">Thêm tin mới</a>
    
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tiêu đề</th>
                <th>Ngày đăng</th>
                <th>Loại tin</th>
                <th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="tin : ${dsTinTuc}">
                <td th:text="${tin.id}"></td>
                <td th:text="${tin.tieude}"></td>
                <td th:text="${#temporals.format(tin.ngaydang, 'dd-MM-yyyy HH:mm')}"></td>
                <td th:text="${tin.loaiTinTuc != null ? tin.loaiTinTuc.ten : 'Không có'}"></td>
                <td>
                    <a th:href="@{/admin/tin-tuc/xoa/{id}(id=${tin.id})}" 
                       class="btn btn-danger btn-sm" 
                       onclick="return confirm('Xóa hả cậu?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
