<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Chỉnh sửa bài viết</h2>
    <form th:action="@{/admin/tintuc/save}" th:object="${tinTuc}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Tiêu đề</label>
            <input type="text" th:field="*{tieude}" class="form-control" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Loại tin tức</label>
            <select th:field="*{loaiTinTuc}" class="form-select">
                <option th:each="loai : ${dsLoaiTin}" 
                        th:value="${loai.id}" 
                        th:text="${loai.ten}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Nội dung</label>
            <textarea th:field="*{noidung}" class="form-control" rows="6"></textarea>
        </div>

        <button type="submit" class="btn btn-warning">Cập nhật thay đổi</button>
        <a th:href="@{/admin/tintuc}" class="btn btn-secondary">Hủy bỏ</a>
    </form>
</body>
</html>
