<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Tin Tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="card-title mb-0">Viết bài mới</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/tintuc/save}" th:object="${tinTuc}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tiêu đề bài viết</label>
                            <input type="text" th:field="*{tieude}" class="form-control" placeholder="Nhập tiêu đề..." required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Loại tin tức</label>
                            <select th:field="*{loaiTinTuc}" class="form-select" required>
                                <option value="">-- Chọn loại tin --</option>
                                <option th:each="loai : ${dsLoaiTin}" 
                                        th:value="${loai.id}" 
                                        th:text="${loai.ten}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nội dung chi tiết</label>
                            <textarea th:field="*{noidung}" class="form-control" rows="6" placeholder="Viết nội dung ở đây..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">Lưu bài viết</button>
                            <a th:href="@{/admin/tintuc}" class="btn btn-secondary">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
