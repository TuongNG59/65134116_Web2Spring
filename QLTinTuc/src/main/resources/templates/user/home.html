<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tin Tức 24h</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .news-card { transition: transform 0.2s; }
        .news-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">TUONG NEWS</a>
            <a th:href="@{/admin/tintuc}" class="btn btn-outline-light btn-sm">Quản trị</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Tin mới nhất</h2>
        <div class="row">
            <div class="col-md-4 mb-4" th:each="tin : ${dsTinTuc}">
                <div class="card h-100 shadow-sm news-card">
                    <div class="card-body">
                        <span class="badge bg-info text-dark mb-2" 
                              th:text="${tin.loaiTinTuc != null ? tin.loaiTinTuc.ten : 'Chung'}"></span>
                        <h5 class="card-title" th:text="${tin.tieude}"></h5>
                        <p class="card-text text-muted" 
                           th:text="${#strings.abbreviate(tin.noidung, 100)}"></p>
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <small class="text-muted" 
                               th:text="${#temporals.format(tin.ngaydang, 'dd/MM/yyyy')}"></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
